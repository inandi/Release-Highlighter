<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ReleaseHighlighter Demo</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 24px; }
      .container { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
      .card { border: 1px solid #e5e7eb; border-radius: 12px; padding: 16px; }
      .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px }
      .nav { display:flex; gap:12px }
      .badge { background:#eef2ff; color:#3730a3; padding:4px 8px; border-radius:8px; font-weight:600 }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="logo">MyApp</div>
      <div class="nav">
        <a href="#">Home</a>
        <a href="#" class="profile-avatar">Profile</a>
        <a href="#">Settings</a>
      </div>
    </div>
    <div class="container">
      <div class="card cart-summary">
        <div class="badge">Cart</div>
        <p>Revamped cart summary with totals.</p>
      </div>
      <div class="card">
        <div class="badge">Other</div>
        <p>Some other content.</p>
      </div>
    </div>

    <script src="../dist/ReleaseHighlighter.min.js"></script>
    <script>
      window.addEventListener('load', function () {
        // ReleaseHighlighter is exposed globally by the IIFE bundle
        var rh = new window.ReleaseHighlighter({ xmlUrl: './release.xml' });
        rh.start();
      });
    </script>
  </body>
  </html>
