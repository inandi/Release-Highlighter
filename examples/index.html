<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Feature Highlights Demo</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background: #f5f6fa;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 250px 1fr;
            min-height: 100vh;
        }

        /* Sidebar Styles */
        .sidebar {
            background: #2c3e50;
            color: white;
            padding: 20px;
        }

        .sidebar-menu {
            list-style: none;
            margin-top: 30px;
        }

        .sidebar-menu li {
            padding: 12px 15px;
            margin: 5px 0;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .sidebar-menu li:hover {
            background: #34495e;
        }

        /* Main Content Styles */
        .main-content {
            padding: 20px;
        }

        .header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .chart-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* New Feature Styles */
        .new-feature-btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin-left: 10px;
        }

        .premium-feature {
            border: 2px solid #f1c40f;
            position: relative;
        }

        .notification-bell {
            position: relative;
            cursor: pointer;
        }

        .notification-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #e74c3c;
            color: white;
            border-radius: 50%;
            padding: 2px 6px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <!-- Sidebar -->
        <div class="sidebar">
            <h2>Dashboard</h2>
            <ul class="sidebar-menu">
                <li>Overview</li>
                <li>Analytics</li>
                <li id="new-reports">Reports 
                    <span class="notification-badge">New</span>
                </li>
                <li>Settings</li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="header">
                <h1>Welcome Back, User!</h1>
                <button id="export-btn" class="new-feature-btn">Export Data</button>
            </div>

            <!-- Stats Grid -->
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Total Users</h3>
                    <p>1,234</p>
                </div>
                <div class="stat-card">
                    <h3>Revenue</h3>
                    <p>$45,678</p>
                </div>
                <div class="stat-card premium-feature" id="ai-insights">
                    <h3>AI Insights</h3>
                    <p>Premium Feature</p>
                </div>
            </div>

            <!-- Chart Container -->
            <div class="chart-container">
                <h3>Performance Overview</h3>
                <p>Chart will be displayed here</p>
            </div>
        </div>
    </div>

    <!-- Include dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/js-cookie@3.0.5/dist/js.cookie.min.js"></script>
    <script src="../dist/ReleaseHighlighter.min.js"></script>

    <script>
        // Initialize the UI Highlighter
        const highlighter = new ReleaseHighlighter.ReleaseHighlighter({
            duration: 50000, // 5 seconds
            cookieExpiry: 7, // 7 days
            onHighlight: (element) => {
                console.log('Highlighting new feature:', element.id);
            },
            onComplete: () => {
                console.log('All new features have been highlighted');
            }
        });

        // Define the new features to highlight
        const newFeatures = [
            {
                selector: '#export-btn',
                description: 'New export functionality! Download your data in various formats.',
                version: '2.1.0'
            },
            {
                selector: '#ai-insights',
                description: 'Try our new AI-powered insights feature (Premium users only)',
                version: '2.1.0'
            },
            {
                selector: '#new-reports',
                description: 'Check out our enhanced reporting capabilities',
                version: '2.1.0'
            }
        ];

        // Function to show highlights
        function showHighlights() {
            highlighter.highlightChanges(newFeatures);
        }

        // Function to reset highlight history (for demo purposes)
        function resetHighlights() {
            highlighter.clearHistory();
            showHighlights();
        }

        // Show highlights when page loads
        document.addEventListener('DOMContentLoaded', showHighlights);

        // Add reset button (for demo purposes)
        const resetButton = document.createElement('button');
        resetButton.textContent = 'Reset Highlights';
        resetButton.style.cssText = 'position: fixed; bottom: 20px; right: 20px; padding: 10px; background: #2c3e50; color: white; border: none; border-radius: 5px; cursor: pointer;';
        resetButton.onclick = resetHighlights;
        document.body.appendChild(resetButton);
    </script>
</body>
</html>
