<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ReleaseHighlighter Test</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 24px; }
      .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
      .tile { border: 1px solid #e5e7eb; border-radius: 12px; padding: 16px; min-height: 100px; }
      .toolbar { display:flex; gap:12px; margin-bottom: 20px; }
      .spacer { height: 600px; }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <button class="feature-a">Feature A Button</button>
      <button>Other</button>
      <a href="#" class="profile-link">Profile</a>
    </div>
    <div class="grid">
      <div class="tile feature-b">
        <h3>Feature B Card</h3>
        <p>Some content here.</p>
      </div>
      <div class="tile">
        <h3>Other Card</h3>
        <p>More content.</p>
      </div>
      <div class="tile">
        <h3>Scroll Test</h3>
        <p>Scroll down to see more elements.</p>
      </div>
    </div>
    <div class="spacer"></div>
    <div class="tile feature-c" style="margin: 0 24px 24px;">
      <h3>Feature C (Lower on page)</h3>
      <p>Tests visibility and repositioning.</p>
    </div>

    <script src="../dist/ReleaseHighlighter.min.js"></script>
    <script>
      window.addEventListener('load', function () {
        // Support both default and direct global export shapes
        var RH = (window.ReleaseHighlighter && (window.ReleaseHighlighter.default || window.ReleaseHighlighter));
        if (!RH) {
          console.error('ReleaseHighlighter global not found');
          return;
        }
        var rh = new RH({ xmlUrl: './release.xml' });
        rh.start();
      });
    </script>
  </body>
  </html>
